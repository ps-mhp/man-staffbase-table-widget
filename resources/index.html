<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon.png">
    <title>man/table-widget</title>
    <!-- locally stored versions of Staffbase frontend assets -->
    <link href="/css/app.css" rel="stylesheet">
    <link href="/css/libs.css" rel="stylesheet">
    <link href="/css/font.css" rel="stylesheet">
    <style>
      body {
        padding: 50px;
      }
      .box {
        border: 2px dashed gray;
        padding: 40px;
      }
      /* Resizable preview container: drag the bottom-right corner to test
         the widget's visibility / sticky / scroll behaviour at any size. */
      #preview {
        resize: both;
        overflow: hidden;
        width: 600px;
        height: 400px;
        min-width: 200px;
        min-height: 150px;
        border: 1px solid #b7bcc3;
        box-sizing: border-box;
      }
      /* Make the widget fill the resizable box so scrolling (and therefore
         the sticky first row/column) happens inside the widget itself. */
      #preview table-widget {
        display: block;
        height: 100%;
      }
      #preview .table-widget-scroll {
        height: 100% !important;
        max-height: 100% !important;
      }
    </style>
  </head>
  <body style="display: flex">
    <div class="box" style="flex: 2">
      <h3>Widget preview:</h3>
      <br />
      <br />
      <section id="preview">
            <table-widget tabledata='[["","Spalte 1","Spalte 2","Spalte 3","Spalte 4","Spalte 5","Spalte 6"],["Zeile 1","a","b","c","d","e","f"],["Zeile 2","a","b","c","d","e","f"],["Zeile 3","a","b","c","d","e","f"],["Zeile 4","a","b","c","d","e","f"],["Zeile 5","a","b","c","d","e","f"],["Zeile 6","a","b","c","d","e","f"],["Zeile 7","a","b","c","d","e","f"],["Zeile 8","a","b","c","d","e","f"],["Zeile 9","a","b","c","d","e","f"],["Zeile 10","a","b","c","d","e","f"]]'></table-widget>
        </section>
    </div>
    <div id="config" style="flex: 1"></div>
  </body>
  <script src="bootstrap.js"></script>
  <script src="man.table-widget.js"></script>
</html>
